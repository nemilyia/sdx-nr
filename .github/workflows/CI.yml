name: CI
on: workflow_dispatch
jobs:
  Run:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize
        run: |
          choco install ngrok -y
          ngrok config add-authtoken ${{ secrets.SERVICE_AUTH }}
          Invoke-WebRequest -Uri "https://github.com/rocult/shiny/releases/download/v0.1.3/medal-x86_64.exe" -OutFile "medal-x86_64.exe"

      - name: Start
        run: |
          Start-Process -NoNewWindow medal-x86_64.exe -ArgumentList "serve"
          Start-Process -NoNewWindow ngrok -ArgumentList "http 3000"
          Start-Sleep -Seconds 5
          $Link = (Invoke-RestMethod http://localhost:4040/api/tunnels).tunnels[0].public_url
          Set-Content -Path link.txt -Value $Link -Force
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add link.txt && git commit -m "chore: update link" && git push

      - name: Sleep
        run: Start-Sleep -Seconds 21600
